<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商城管理后台</title>
    <style>
      #app-loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #eff6ff 0%, #f8fafc 35%, #f1f5f9 100%);
        z-index: 9999;
      }
      .loader-wrap { display: grid; gap: 12px; justify-items: center; }
      .loader-ring {
        width: 38px;
        height: 38px;
        border: 3px solid rgba(30, 64, 175, 0.18);
        border-top-color: #2563eb;
        border-radius: 999px;
        animation: spin .8s linear infinite;
      }
      .loader-text { font-size: 13px; color: #334155; letter-spacing: .2px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app-loading">
      <div class="loader-wrap">
        <div class="loader-ring"></div>
        <div class="loader-text">商城治理中枢加载中...</div>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
